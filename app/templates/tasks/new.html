{% extends 'base.html' %}

{% block title %}新增任務 - 任務管理系統{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">新增任務</h5>
                <a href="{{ url_for('tasks.index') }}" class="btn btn-sm btn-outline-secondary">返回列表</a>
            </div>
            <div class="card-body">
                <form action="{{ url_for('tasks.create') }}" method="POST">
                    <div class="mb-3">
                        <label for="title" class="form-label">任務標題 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="title" name="title" value="{{ title|default('') }}" required autofocus>
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">任務描述</label>
                        <textarea class="form-control" id="description" name="description" rows="3">{{ description|default('') }}</textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="due_date" class="form-label">截止日期</label>
                            <input type="date" class="form-control" id="due_date" name="due_date" value="{{ due_date|default('') }}">
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="priority" class="form-label">優先等級</label>
                            <select class="form-select" id="priority" name="priority">
                                <option value="low" {% if priority == 'low' %}selected{% endif %}>低</option>
                                <option value="medium" {% if not priority or priority == 'medium' %}selected{% endif %}>中</option>
                                <option value="high" {% if priority == 'high' %}selected{% endif %}>高</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary">儲存任務</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
